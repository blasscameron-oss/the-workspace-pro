[build]
  command = "echo 'No build step needed for static site'"
  publish = "."

[build.environment]
  # No environment variables needed for static site

[[headers]]
  for = "/*"
  [headers.values]
    # Security Headers
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Performance & Caching
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
    
    # CORS for fonts and assets
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/static/*"
  [headers.values]
    # Long cache for static assets (1 year)
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Content Security Policy - Applied via _headers file instead
# (Netlify has issues with CSP in netlify.toml for complex policies)

[[redirects]]
  from = "/content/*"
  to = "/content/:splat"
  status = 200

[[redirects]]
  from = "https://hilarious-kashata-ca8d6f.netlify.app/*"
  to = "https://www.theworkspacepro.com/:splat"
  status = 301
  force = true

# Redirect www to non-www (or vice versa based on preference)
[[redirects]]
  from = "https://theworkspacepro.com/*"
  to = "https://www.theworkspacepro.com/:splat"
  status = 301

# Fallback for SPA-like routing (for client-side routing if needed)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Language = ["en"], Country = ["US"]}
  force = false