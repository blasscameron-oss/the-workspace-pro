name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Tailwind CSS
        run: |
          npm ci
          npx tailwindcss --input static/css/tailwind-input.css --output static/css/tailwind.min.css

      - name: Build site to _site
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude='_site' --exclude='.git' --exclude='node_modules' \
            --exclude='pipeline_output' --exclude='pipeline_source' \
            --exclude='clean_site' --exclude='cloudflare_lite' \
            --exclude='cloudflare_minimal' --exclude='quick_test' \
            --exclude='deploy_root' --exclude='AFFILIATE_SETUP' \
            --exclude='DEPLOY' --exclude='README' \
            --exclude='Dockerfile' --exclude='docker-build' \
            --exclude='package.json' --exclude='package-lock.json' \
            ./ _site/

      - name: Debug build output
        run: ls -la _site/ && ls _site/static/css/ && wc -c _site/static/css/tailwind.min.css

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name the-workspace-pro --branch main
