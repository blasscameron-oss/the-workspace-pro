name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build site to _site
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude='_site' --exclude='.git' --exclude='node_modules' \
            --exclude='pipeline_output' --exclude='pipeline_source' \
            --exclude='clean_site' --exclude='cloudflare_lite' \
            --exclude='cloudflare_minimal' --exclude='quick_test' \
            --exclude='deploy_root' --exclude='AFFILIATE_SETUP' \
            --exclude='DEPLOY' --exclude='README' \
            --exclude='Dockerfile' --exclude='docker-build' \
            --exclude='package.json' --exclude='package-lock.json' \
            ./ _site/

      - name: Debug build output
        run: |
          echo "=== _site structure ==="
          ls -la _site/
          echo "=== Content pages ==="
          ls _site/content/ | head -15
          echo "=== Total HTML files ==="
          find _site -name '*.html' | wc -l

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name the-workspace-pro --branch main
