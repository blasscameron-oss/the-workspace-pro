name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug files
        run: |
          ls -la
          ls -la content/
          echo "Sync script exists?"
          ls -la sync_site.sh || true

      - name: Build site
        run: |
          echo "Creating _site directory..."
          mkdir -p _site
          mkdir -p _site/static/css
          mkdir -p _site/static/images
          mkdir -p _site/static/js
          mkdir -p _site/content
          
          echo "Copying HTML files..."
          cp index.html _site/
          cp deals.html _site/ 2>/dev/null || true
          
          # Copy content directory
          cp -r content/* _site/content/ 2>/dev/null || true
          
          # Create deals directory
          mkdir -p _site/deals
          cp deals.html _site/deals/index.html 2>/dev/null || true
          
          # Copy static assets
          cp static/css/custom.css _site/static/css/
          cp -r static/images/* _site/static/images/ 2>/dev/null || true
          cp -r static/js/* _site/static/js/ 2>/dev/null || true
          
          # Copy config files
          cp sitemap.xml robots.txt search.json _site/ 2>/dev/null || echo "Config files missing"
          cp netlify.toml _headers _redirects _routes.json _site/ 2>/dev/null || echo "Deployment configs missing"
          
          echo "Built _site directory:"
          ls -la _site/
          ls -la _site/content/ | head -5
          echo "Total HTML files: $(find _site -name '*.html' | wc -l)"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=the-workspace-pro --branch=main
          workingDirectory: .