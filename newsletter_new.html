<!-- Newsletter -->
<section id="newsletter" class="py-20">
    <div class="max-w-2xl mx-auto px-6 text-center">
        <h2 class="text-3xl font-bold mb-4">Want more workspace tips?</h2>
        <p class="text-zinc-600 dark:text-zinc-400 mb-8">Subscribe to our free newsletter for weekly tips, product roundups, and ergonomic advice.</p>
        <form name="newsletter" method="POST" action="/api/subscribe" class="flex flex-col sm:flex-row gap-4 max-w-md mx-auto">
            <input type="hidden" name="referrer" id="newsletter-referrer">
            <div class="relative flex-1">
                <label for="newsletter-email" class="sr-only">Email address</label>
                <input type="email" id="newsletter-email" name="email" placeholder="your@email.com" aria-describedby="consent-note" required class="w-full px-6 py-4 bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-2xl focus:outline-none focus:border-emerald-600">
            </div>
            <div class="w-full flex items-center gap-2 text-sm text-zinc-600 mt-2">
                <input type="checkbox" id="consent" name="consent" required class="rounded">
                <label for="consent" id="consent-note">I agree to receive email updates (see <a href="/privacy/" class="text-emerald-600 underline">Privacy Policy</a>)</label>
            </div>
            <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white px-10 py-4 rounded-2xl font-semibold transition">
                Subscribe
            </button>
        </form>
        <div id="newsletter-message" class="hidden mt-4 px-4 py-3 rounded-xl text-sm"></div>
        <p class="text-xs text-zinc-500 mt-6">Zero spam. Unsubscribe anytime.</p>
        <script>
        document.addEventListener('DOMContentLoaded', function() {
          const form = document.querySelector('form[name="newsletter"]');
          const messageDiv = document.getElementById('newsletter-message');
          const referrerInput = document.getElementById('newsletter-referrer');
          
          // Set referrer to current page URL
          if (referrerInput) {
            referrerInput.value = window.location.href;
          }
          
          if (form) {
            form.addEventListener('submit', async function(e) {
              e.preventDefault();
              
              // Basic validation
              const email = form.querySelector('input[type="email"]').value.trim();
              const consent = form.querySelector('input[type="checkbox"]').checked;
              
              if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showMessage('Please enter a valid email address.', 'error');
                return;
              }
              if (!consent) {
                showMessage('You must agree to the privacy policy.', 'error');
                return;
              }
              
              // Disable button
              const button = form.querySelector('button[type="submit"]');
              const originalText = button.textContent;
              button.textContent = 'Subscribing...';
              button.disabled = true;
              
              // Submit to our Cloudflare Function
              try {
                const formData = new FormData(form);
                const response = await fetch('/api/subscribe', {
                  method: 'POST',
                  body: formData,
                });
                
                const result = await response.json();
                
                if (result.success) {
                  showMessage(result.message || 'Thank you! You’re subscribed.', 'success');
                  form.reset();
                  // Reset referrer after successful submission
                  if (referrerInput) referrerInput.value = window.location.href;
                } else {
                  showMessage(result.message || 'Something went wrong.', 'error');
                }
              } catch (error) {
                console.error('Subscription error:', error);
                showMessage('Sorry, something went wrong. Please try again later.', 'error');
              } finally {
                button.textContent = originalText;
                button.disabled = false;
              }
            });
          }
          
          function showMessage(text, type) {
            if (!messageDiv) return;
            messageDiv.textContent = text;
            messageDiv.className = `mt-4 px-4 py-3 rounded-xl text-sm ${type === 'success' ? 'bg-emerald-50 text-emerald-800 border border-emerald-200' : 'bg-red-50 text-red-800 border border-red-200'}`;
            messageDiv.classList.remove('hidden');
            setTimeout(() => {
              messageDiv.classList.add('hidden');
            }, 5000);
          }
        });
        </script>
    </div>
</section>
