<!DOCTYPE html>
<html>
<head>
    <title>Quick Test</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; }
        .pass { color: green; }
        .fail { color: red; }
    </style>
</head>
<body>
    <h1>Quick Functionality Tests</h1>
    <p>Testing basic site functionality...</p>
    
    <h2>Test Results:</h2>
    <ul>
        <li>✅ CSS loaded: <span id="css-test" class="fail">Checking...</span></li>
        <li>✅ JavaScript console: <span id="js-test" class="fail">Checking...</span></li>
        <li>✅ Images loaded: <span id="img-test" class="fail">Checking...</span></li>
        <li>✅ Search index: <span id="search-test" class="fail">Checking...</span></li>
    </ul>
    
    <script>
        // CSS test
        if (document.styleSheets.length > 0) {
            document.getElementById('css-test').className = 'pass';
            document.getElementById('css-test').textContent = 'Loaded';
        }
        
        // JS test
        document.getElementById('js-test').className = 'pass';
        document.getElementById('js-test').textContent = 'Running';
        
        // Image test
        const imgs = document.getElementsByTagName('img');
        if (imgs.length > 0) {
            document.getElementById('img-test').className = 'pass';
            document.getElementById('img-test').textContent = imgs.length + ' images';
        }
        
        // Search test
        fetch('/search.json')
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(() => {
                document.getElementById('search-test').className = 'pass';
                document.getElementById('search-test').textContent = 'Available';
            })
            .catch(() => {
                document.getElementById('search-test').textContent = 'Missing';
            });
    </script>
</body>
</html>
